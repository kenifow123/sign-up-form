<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Title</title>
    <link rel="stylesheet" href="index.css">

</head>
<body>

    <div class="left">
        <div class="banner">
            <p id="logo-text"><img id="logo-img" src="/files/images/odin-lined.png" alt="">Odin</p>
        </div>
    </div>

    <div class="right">
        <div class="intro-text">
            <h1>This is not a real online service! You know you need something like this in your life to help you realize your deepest dreams. Sign up <i>now</i> to get started.</h1>
<!--            <h1>"Lorem ipsum dolor sit amet, consectetur adipiscing elit, sed do eiusmod tempor incididunt ut labore et dolore magna aliqua. Ut enim ad minim veniam, quis nostrud exercitation ullamco laboris nisi ut aliquip ex ea commodo consequat. Duis aute irure dolor in reprehenderit in voluptate velit esse cillum dolore eu fugiat nulla pariatur. Excepteur sint occaecat cupidatat non proident, sunt in culpa qui officia deserunt mollit anim id est laborum."</h1>-->
            <h1>You <i>know</i> you want to.</h1>
        </div>

        <div class="form-section">
            <h1>Let's do this!</h1>
            <form id="signup-form">
                <div class="form-left">
                    <div class="form-field">
                        <label for="first_name">First Name:
                            <input type="text" class="text-input" id="first_name">
                        </label>
                    </div>

                    <div class="form-field">
                        <label for="email">Email:
                            <input type="email" class="text-input" id="email" minlength="8">
                            <span class="error" aria-live="polite"></span>
                        </label>
                    </div>

                    <div class="form-field">
                        <label for="password">Password:
                            <input type="text" class="text-input" id="password">
                        </label>
                    </div>

                </div>
                <div class="form-right">
                    <div class="form-field">
                        <label for="last_name">Last Name:
                            <input type="text" class="text-input" id="last_name">
                        </label>
                    </div>

                    <div class="form-field">
                        <label for="phone">Phone Number:
                            <input type="tel" class="text-input" id="phone">
                        </label>
                    </div>

                    <div class="form-field">
                        <label for="confirm_pw">Confirm Password:
                            <input type="text" class="text-input" id="confirm_pw">
                        </label>
                    </div>
                </div>
            </form>
        </div>

        <div class="buttons-div">
            <button type="submit" form="signup-form">Create Account</button>
            <p>Already have an account? <a href="/login">Log in</a></p>
        </div>

    </div>

    <script src="index.js"></script>




</body>
</html>
